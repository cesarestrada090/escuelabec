<nav class="topbar">
  <button class="btn-toggle" (click)="toggleSidebar.emit()" title="Toggle menú">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <div class="topbar-right">
    @if (authService.getCurrentUser(); as user) {
      <span class="user-greeting">{{ user.firstName }} {{ user.lastName }}</span>
      <span class="role-chip">{{ user.role }}</span>
      <button class="btn-logout" (click)="logout()" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Salir</span>
      </button>
    }
  </div>
</nav>
